apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-assessment-hpa
  namespace: aikosh-quality-toolkit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker-assessment
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: External
      external:
        metric:
          name: celery_queue_length
          selector:
            matchLabels:
              queue: assessment
        target:
          type: AverageValue
          averageValue: "10"
